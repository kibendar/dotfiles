# Unbind the default prefix
unbind C-b

# Set Ctrl+A as prefix
set -g prefix C-a

# Bind the prefix key
bind C-a send-prefix


set -g detach-on-destroy off
set -g escape-time 0
set -g history-limit 1000000
set -g set-clipboard on
set -g status-position top


set -g allow-passthrough on
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g pane-border-lines double
set-window-option -g pane-base-index 1
set-window-option -g mode-keys vi
set-option -g renumber-windows on
set-option -sa terminal-overrides ",xterm*:Tc"

# ============================================
# COPY MODE & MESSAGES — Kanagawa
# ============================================
set -g mode-style "bg=#2D4F67,fg=#DCD7BA"
set -g message-style "bg=#2A2A37,fg=#E6C384"
set -g message-command-style "bg=#2A2A37,fg=#7FB4CA"

# ============================================
# PANE MANAGEMENT (Alt-based)
# ============================================
unbind %
unbind '"'
# Split panes
bind -n M-v split-window -h -c '#{pane_current_path}'
bind -n M-s split-window -v -c '#{pane_current_path}'

# Navigate panes
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
 
# Resize panes (Alt+Shift for resize)
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 2
bind -n M-K resize-pane -U 2
bind -n M-L resize-pane -R 5

# Rotate panes with prefix + h/l
bind h rotate-window -D   # rotate "down" (counter-clockwise)
bind l rotate-window -U   # rotate "up" (clockwise)

# Close pane without confirmation
bind -n M-x kill-pane

# Toggle pane zoom (fullscreen)
bind -n M-z resize-pane -Z

# Break pane into new window
bind -n M-b break-pane -d

# ============================================
# WINDOW MANAGEMENT (Alt-based)
# ============================================
# Create new window in current directory
bind -n M-Enter new-window -c '#{pane_current_path}'

# Quick window switching
bind -n M-n next-window
bind -n M-p previous-window

# Close window with confirmation
bind k confirm-before -p "kill-window #W? (y/n)" kill-window

# Move windows left/right
bind -n M-< swap-window -t -1\; select-window -t -1
bind -n M-> swap-window -t +1\; select-window -t +1

# ============================================
# SESSION MANAGEMENT (Alt-based)
# ============================================
bind-key -n M-w run-shell "~/.config/tmux/plugins/tmux-fzf/scripts/session.sh switch"

# Kill session with confirmation
bind -n M-X confirm-before -p "kill-session #S? (y/n)" kill-session

# Detach from session
bind -n M-d detach-client

# ============================================
# COPY MODE (Alt-based)
# ============================================
# Enter copy mode
bind -n M-[ copy-mode

# Copy mode vim bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Y send-keys -X copy-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Mouse drag copies selection
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Paste with Alt+p
bind -n M-p paste-buffer

# ============================================
# USEFUL SHORTCUTS (Alt-based)
# ============================================
# Reload config file easily
bind -n M-r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# Open command prompt
bind -n 'M-:' command-prompt

# Show all keybindings
bind -n 'M-?' list-keys

# Toggle status bar
bind -n M-q set-option -g status

# ============================================
# PLUGINS
# ============================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'omerxx/tmux-sessionx'

# ============================================
# THEME PLUGINS
# ============================================
set -g @plugin 'omerxx/catppuccin-tmux'
# set -g @plugin 'Nybkox/tmux-ukiyo'

# ============================================
# CONFIGURE PLUGINS
# ============================================
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-save-interval '15'
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color '#7E9CD8'    # crystalBlue
set -g @floax-text-color '#DCD7BA'      # fujiWhite
set -g @floax-bind '-n M-p'
set -g @floax-change-path 'true'
set -g @sessionx-bind-select-up 'ctrl-k'
set -g @sessionx-bind-select-down 'ctrl-j'
set -g @sessionx-bind-new-window 'ctrl-n'
set -g @sessionx-bind-rename-session 'ctrl-r'
set -g @sessionx-bind-kill-session 'ctrl-x'
set -g @sessionx-bind-tree-mode 'ctrl-t'
set -g @sessionx-bind-back 'ctrl-b'
set -g @sessionx-bind-accept 'enter'
set -g @sessionx-bind-delete-char 'bspace'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
bind-key -n M-f run-shell -b "~/.config/tmux/plugins/tmux-fzf/main.sh"
#
# # ============================================
# # CONFIGURE THEME PLUGINS
# # ============================================
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
set -g @catppuccin_status_modules_right "directory" # date_time"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"
# Recolor individual status modules
set -g @catppuccin_directory_color "#7E9CD8"   # crystalBlue
set -g @catppuccin_session_color "#C0A36E"     # boatYellow2
